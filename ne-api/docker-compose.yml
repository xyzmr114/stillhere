services:
  ne-api:
    build: .
    container_name: stillhere-ne-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8900:8900"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "autoheal=true"
