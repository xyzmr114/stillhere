services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stillhere-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      - "autoheal=true"
    networks:
      - default
      - authelia
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stillhere-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.escalation inspect ping || exit 1"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    labels:
      - "autoheal=true"
    command: celery -A tasks.escalation worker --loglevel=info --concurrency=2
    working_dir: /app

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stillhere-beat
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.escalation inspect ping || exit 1"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    labels:
      - "autoheal=true"
    command: celery -A tasks.escalation beat --loglevel=info

  redis:
    image: redis:7-alpine
    container_name: stillhere-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "autoheal=true"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: stillhere-autoheal
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60

networks:
  default:
  authelia:
    external: true
    name: authelia_default

volumes:
  redis-data:
