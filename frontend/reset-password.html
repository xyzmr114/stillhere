<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Still Here</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080808;--surface:#111;--surface2:#161616;--border:rgba(255,255,255,0.08);--text:#F5F5F5;--dim:rgba(255,255,255,0.55);--muted:rgba(255,255,255,0.25);--red:#FF3B3B;--red-deep:#E02424;--green:#4ecca3}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(220,38,38,0.07) 0%,transparent 60%);pointer-events:none}
.card{position:relative;z-index:1;width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:28px 32px;border-bottom:1px solid var(--border);text-align:center}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:800;color:var(--red)}
.card-body{padding:32px}
h2{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px}
.subtitle{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:28px}
label{display:block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:16px}
input:focus{border-color:rgba(255,59,59,0.4)}
input::placeholder{color:var(--muted)}
.btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.06em;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--red-deep)}
.btn:disabled{opacity:0.5;cursor:default}
.msg{font-size:13px;line-height:1.5;padding:12px 14px;border-radius:6px;margin-bottom:16px;display:none}
.msg.success{background:rgba(78,204,163,0.1);border:1px solid rgba(78,204,163,0.25);color:var(--green)}
.msg.error{background:rgba(255,59,59,0.08);border:1px solid rgba(255,59,59,0.2);color:var(--red)}
.back{display:block;text-align:center;margin-top:20px;font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:0.06em}
.back:hover{color:var(--dim)}
.strength{height:3px;border-radius:2px;margin-top:-10px;margin-bottom:16px;background:var(--border);overflow:hidden}
.strength-bar{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s}
</style>
</head>
<body>
<div class="card">
  <div class="card-header"><div class="logo">Still Here</div></div>
  <div class="card-body" id="cardBody">
    <!-- Rendered by JS -->
  </div>
</div>

<script>
var API = '';
var token = new URLSearchParams(location.search).get('token');
var body = document.getElementById('cardBody');

function api(path, opts) {
  return fetch(API + path, Object.assign({headers:{'Content-Type':'application/json'}}, opts))
    .then(function(r){ return r.json().then(function(d){ if(!r.ok) throw new Error(d.detail||'Error'); return d; }); });
}

function showMsg(el, type, text) {
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

if (token) {
  // Reset form
  body.innerHTML = '<h2>New password</h2><p class="subtitle">Choose a strong password — at least 8 characters.</p><div id="msg" class="msg"></div><label>New Password</label><input type="password" id="pw" placeholder="New password" autocomplete="new-password"><div class="strength"><div class="strength-bar" id="strengthBar"></div></div><label>Confirm Password</label><input type="password" id="pw2" placeholder="Confirm password" autocomplete="new-password"><button class="btn" id="resetBtn">Set New Password</button><a href="/signin" class="back">← Back to login</a>';

  var pw = document.getElementById('pw');
  var strengthBar = document.getElementById('strengthBar');
  pw.addEventListener('input', function() {
    var v = pw.value, s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    var colors = ['#FF3B3B','#f5a623','#4ecca3','#4ecca3'];
    strengthBar.style.width = (s * 25) + '%';
    strengthBar.style.background = colors[Math.max(0, s-1)] || '#FF3B3B';
  });

  document.getElementById('resetBtn').addEventListener('click', function() {
    var msg = document.getElementById('msg');
    var p1 = document.getElementById('pw').value;
    var p2 = document.getElementById('pw2').value;
    if (p1.length < 8) { showMsg(msg, 'error', 'Password must be at least 8 characters'); return; }
    if (p1 !== p2) { showMsg(msg, 'error', 'Passwords don\'t match'); return; }
    var btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = 'Saving...';
    api('/users/reset-password', {method:'POST', body: JSON.stringify({token: token, new_password: p1})})
      .then(function() {
        showMsg(msg, 'success', 'Password updated! Redirecting to login...');
        setTimeout(function(){ location.href = '/signin'; }, 1800);
      })
      .catch(function(e) {
        showMsg(msg, 'error', e.message);
        btn.disabled = false; btn.textContent = 'Set New Password';
      });
  });

} else {
  // Request form
  body.innerHTML = '<h2>Forgot password?</h2><p class="subtitle">Enter your email and we\'ll send you a reset link. It expires in 1 hour.</p><div id="msg" class="msg"></div><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"><button class="btn" id="sendBtn">Send Reset Link</button><a href="/signin" class="back">← Back to login</a>';

  document.getElementById('sendBtn').addEventListener('click', function() {
    var msg = document.getElementById('msg');
    var email = document.getElementById('email').value.trim();
    if (!email) { showMsg(msg, 'error', 'Please enter your email'); return; }
    var btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.textContent = 'Sending...';
    api('/users/forgot-password', {method:'POST', body: JSON.stringify({email: email})})
      .then(function(d) {
        showMsg(msg, 'success', d.message);
        btn.textContent = 'Sent';
      })
      .catch(function(e) {
        showMsg(msg, 'error', e.message);
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      });
  });

  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('sendBtn').click();
  });
}
</script>
</body>
</html>
