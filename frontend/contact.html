<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact Us — Still Here</title>
<meta name="description" content="Get in touch with the Still Here team. Questions, feedback, or issues — we'll get back to you within 24 hours.">
<meta property="og:title" content="Contact Us — Still Here">
<meta property="og:description" content="Questions, feedback, or issues? We'll get back to you within 24 hours.">
<meta property="og:type" content="website">
<meta property="og:image" content="/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080808;--surface:#111111;--border:rgba(255,255,255,0.08);--text:#F5F5F5;--dim:rgba(255,255,255,0.55);--muted:rgba(255,255,255,0.25);--red:#FF3B3B}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 55%,rgba(220,38,38,0.06) 0%,transparent 55%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;opacity:0.022;mix-blend-mode:overlay;pointer-events:none;z-index:1;background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPSc0JyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzIwMCcgaGVpZ2h0PScyMDAnIGZpbHRlcj0ndXJsKCUyM24pJy8+PC9zdmc+")}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:rgba(8,8,8,0.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:800;color:var(--red);letter-spacing:-0.3px;text-decoration:none}
.nav-links a{font-size:11px;letter-spacing:0.12em;color:var(--muted);text-decoration:none;transition:color .15s;text-transform:uppercase}
.nav-links a:hover{color:var(--text)}
.c{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:80px 48px 120px}
.eyebrow{font-size:11px;letter-spacing:0.2em;color:var(--red);text-transform:uppercase;margin-bottom:16px}
h1{font-family:'Fraunces',serif;font-size:clamp(36px,5vw,56px);font-weight:900;letter-spacing:-1.5px;margin-bottom:12px;line-height:1.05}
.subtitle{font-size:13px;line-height:1.8;color:var(--dim);margin-bottom:48px}
form .field{margin-bottom:24px}
form label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
form input,form textarea{width:100%;font-family:'DM Mono',monospace;font-size:14px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;outline:none;transition:border-color .15s}
form input:focus,form textarea:focus{border-color:rgba(255,255,255,0.2)}
form textarea{resize:vertical;min-height:140px}
form button{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#fff;background:var(--red);border:none;border-radius:6px;padding:14px 32px;cursor:pointer;transition:opacity .15s}
form button:hover{opacity:0.85}
form button:disabled{opacity:0.5;cursor:not-allowed}
.msg{margin-top:20px;font-size:13px;padding:12px 16px;border-radius:6px;display:none}
.msg.success{display:block;background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2)}
.msg.error{display:block;background:rgba(255,59,59,0.1);color:var(--red);border:1px solid rgba(255,59,59,0.2)}
footer{text-align:center;padding:32px 48px;border-top:1px solid var(--border);position:relative;z-index:2}
footer p{font-size:12px;color:var(--muted)}
a{color:var(--red);text-decoration:none}
a:hover{text-decoration:underline}
@media(max-width:640px){nav{padding:14px 20px}.c{padding:60px 20px 80px}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">Still Here</a>
  <div class="nav-links"><a href="/">Home</a></div>
</nav>
<div class="c">
  <div class="eyebrow">Get in touch</div>
  <h1>Contact Us</h1>
  <p class="subtitle">Questions, feedback, or issues? We'll get back to you within 24 hours.</p>

  <form id="contact-form">
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
    </div>
    <button type="submit" id="submit-btn">Send Message</button>
    <div class="msg" id="form-msg"></div>
  </form>
</div>
<footer>
  <p>&copy; 2026 Still Here &mdash; <a href="/terms">Terms</a> &middot; <a href="/privacy">Privacy</a> &middot; <a href="/consent">Consent</a> &middot; <a href="/sitemap">Sitemap</a></p>
</footer>
<script>
document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('submit-btn');
  var msg = document.getElementById('form-msg');
  var name = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();
  var message = document.getElementById('message').value.trim();

  btn.disabled = true;
  btn.textContent = 'Sending…';
  msg.className = 'msg';
  msg.textContent = '';

  try {
    var res = await fetch('/api/contact', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name, email: email, message: message})
    });
    if (!res.ok) throw new Error();
    msg.className = 'msg success';
    msg.textContent = "Message sent. We'll be in touch.";
    document.getElementById('contact-form').reset();
  } catch (_) {
    msg.className = 'msg error';
    msg.textContent = 'Something went wrong. Please try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Message';
  }
});
</script>
</body>
</html>
