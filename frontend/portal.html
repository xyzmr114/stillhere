<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Still Here — Contact Portal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f1a;
    color: #f0f0f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.card {
    background: #12121e;
    border: 1px solid #1e1e32;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    max-width: 440px;
    width: 100%;
    padding: 32px;
    text-align: center;
}
.app-label {
    font-size: 11px;
    font-weight: 600;
    color: #55556a;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 24px;
}
h1 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 24px;
    color: #8888a0;
    line-height: 1.4;
}
.status-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    margin: 0 auto 16px;
}
.status-circle.green  { background: #4ecca3; box-shadow: 0 0 20px rgba(78,204,163,0.3); }
.status-circle.yellow { background: #f5a623; box-shadow: 0 0 20px rgba(245,166,35,0.3); }
.status-circle.red    { background: #e94560; box-shadow: 0 0 20px rgba(233,69,96,0.3); }
.status-circle.gray   { background: #55556a; }
.status-text {
    font-size: 18px;
    font-weight: 600;
    color: #f0f0f5;
    margin-bottom: 6px;
}
.streak {
    font-size: 13px;
    color: #55556a;
    margin-bottom: 24px;
}
.actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
}
.btn {
    padding: 11px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.15s;
    width: 100%;
}
.btn:hover { opacity: 0.8; }
.btn-secondary {
    background: #1a1a2e;
    border: 1px solid #1e1e32;
    color: #8888a0;
}
.btn-danger {
    background: rgba(233,69,96,0.12);
    color: #e94560;
    border: 1px solid rgba(233,69,96,0.25);
}
.note {
    font-size: 12px;
    color: #55556a;
    line-height: 1.6;
}
.error { color: #e94560; margin-top: 16px; font-size: 14px; }
.hidden { display: none; }
.new-token {
    word-break: break-all;
    background: rgba(78,204,163,0.08);
    border: 1px solid rgba(78,204,163,0.2);
    padding: 12px;
    border-radius: 8px;
    margin-top: 12px;
    font-size: 13px;
    color: #4ecca3;
}
.divider {
    border: none;
    border-top: 1px solid #1e1e32;
    margin: 24px 0;
}
.family-section-title {
    font-size: 11px;
    font-weight: 600;
    color: #55556a;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: left;
    margin-bottom: 12px;
}
.family-member-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #0a0a14;
    border: 1px solid #1e1e32;
    border-radius: 10px;
    margin-bottom: 8px;
    text-align: left;
}
.portal-avatar {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: rgba(233,69,96,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: #e94560;
    flex-shrink: 0;
}
.portal-member-info { flex: 1; min-width: 0; }
.portal-member-name {
    font-size: 14px;
    font-weight: 500;
    color: #f0f0f5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.portal-member-seen {
    font-size: 11px;
    color: #55556a;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
}
.portal-status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}
.dot-green  { background: #4ecca3; }
.dot-yellow { background: #f5a623; }
.dot-red    { background: #e94560; }
.dot-gray   { background: #55556a; }
</style>
</head>
<body>
<div class="card">
  <div class="app-label">Still Here</div>
  <h1 id="header">Loading...</h1>
  <div id="status-section" class="hidden">
    <div id="status-circle" class="status-circle gray"></div>
    <div id="status-text" class="status-text"></div>
    <div id="streak" class="streak"></div>
    <div class="actions">
      <button class="btn btn-secondary" id="refresh-btn">Refresh my access link</button>
      <button class="btn btn-danger" id="revoke-btn">Remove my access</button>
    </div>
  </div>
  <div id="family-section" class="hidden">
    <hr class="divider">
    <div class="family-section-title">Family members</div>
    <div id="family-member-list"></div>
  </div>
  <div id="error-msg" class="error hidden"></div>
  <div id="refresh-result" class="hidden new-token"></div>
  <p class="note">This is a read-only status page. If you're concerned, contact them directly.</p>
</div>
<script>
(function() {
  const token = window.location.pathname.split('/').pop().replace('.html', '');
  const baseUrl = window.location.origin;

  function statusDotClass(lastCheckin) {
    if (!lastCheckin) return 'dot-gray';
    const days = (Date.now() - new Date(lastCheckin).getTime()) / 86400000;
    if (days < 1) return 'dot-green';
    if (days < 2) return 'dot-yellow';
    return 'dot-red';
  }

  function lastSeenText(lastCheckin) {
    if (!lastCheckin) return 'Never checked in';
    const diff = Date.now() - new Date(lastCheckin).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return 'Checked in today';
    const days = Math.floor(hrs / 24);
    if (days === 1) return '1 day ago';
    return days + ' days ago';
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  async function fetchStatus() {
    try {
      const resp = await fetch(baseUrl + '/portal/' + token);
      if (!resp.ok) {
        document.getElementById('header').textContent = 'Access not found';
        document.getElementById('error-msg').textContent = 'This link is invalid or has been revoked.';
        document.getElementById('error-msg').classList.remove('hidden');
        return;
      }
      const data = await resp.json();
      render(data);
    } catch (e) {
      document.getElementById('header').textContent = 'Something went wrong';
      document.getElementById('error-msg').textContent = 'Could not load status.';
      document.getElementById('error-msg').classList.remove('hidden');
    }
  }

  function render(data) {
    document.getElementById('header').textContent = data.user_name + ' listed you as an emergency contact';
    const circle = document.getElementById('status-circle');
    const text = document.getElementById('status-text');
    const streakEl = document.getElementById('streak');

    if (data.escalation_active) {
      circle.className = 'status-circle red';
      text.textContent = 'Escalation is active';
    } else if (!data.last_checkin) {
      circle.className = 'status-circle red';
      text.textContent = "Hasn't checked in recently";
    } else {
      const hours = Math.floor((Date.now() - new Date(data.last_checkin).getTime()) / 3600000);
      if (hours < 24) {
        circle.className = 'status-circle green';
        text.textContent = 'Checked in today';
      } else if (hours < 48) {
        circle.className = 'status-circle yellow';
        text.textContent = 'Last checked in ' + hours + ' hours ago';
      } else {
        circle.className = 'status-circle red';
        text.textContent = 'Last checked in ' + Math.floor(hours / 24) + ' days ago';
      }
    }

    if (data.streak > 0) {
      streakEl.textContent = data.streak + ' day' + (data.streak !== 1 ? 's' : '') + ' of checking in';
    } else {
      streakEl.textContent = '';
    }

    document.getElementById('status-section').classList.remove('hidden');

    if (data.family_members && data.family_members.length > 0) {
      const familySection = document.getElementById('family-section');
      const list = document.getElementById('family-member-list');
      list.innerHTML = '';
      data.family_members.forEach(function(m) {
        const dotClass = statusDotClass(m.last_checkin);
        const seen = lastSeenText(m.last_checkin);
        const initial = ((m.name || m.email || '?')[0]).toUpperCase();
        const row = document.createElement('div');
        row.className = 'family-member-row';
        row.innerHTML =
          '<div class="portal-avatar">' + esc(initial) + '</div>' +
          '<div class="portal-member-info">' +
            '<div class="portal-member-name">' + esc(m.name || m.email) + '</div>' +
            '<div class="portal-member-seen">' +
              '<span class="portal-status-dot ' + dotClass + '"></span>' +
              esc(seen) +
            '</div>' +
          '</div>';
        list.appendChild(row);
      });
      familySection.classList.remove('hidden');
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', async function() {
    try {
      const resp = await fetch(baseUrl + '/portal/' + token + '/refresh', { method: 'POST' });
      if (!resp.ok) { alert('Could not refresh token.'); return; }
      const data = await resp.json();
      const el = document.getElementById('refresh-result');
      el.textContent = 'New link: ' + baseUrl + '/portal/' + data.token;
      el.classList.remove('hidden');
    } catch (e) {
      alert('Could not refresh token.');
    }
  });

  document.getElementById('revoke-btn').addEventListener('click', async function() {
    if (!confirm('This will remove your access. Are you sure?')) return;
    try {
      await fetch(baseUrl + '/portal/' + token + '/revoke', { method: 'POST' });
      document.getElementById('status-section').classList.add('hidden');
      document.getElementById('family-section').classList.add('hidden');
      document.getElementById('header').textContent = 'Access removed';
    } catch (e) {
      alert('Could not revoke token.');
    }
  });

  fetchStatus();
})();
</script>
</body>
</html>
