<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Still Here — Contact Portal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 420px; width: 100%; padding: 32px; text-align: center; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: #555; }
.status-circle { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 16px; }
.status-circle.green { background: #22c55e; }
.status-circle.yellow { background: #eab308; }
.status-circle.red { background: #ef4444; }
.status-circle.gray { background: #9ca3af; }
.status-text { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
.streak { font-size: 14px; color: #666; margin-bottom: 24px; }
.actions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn-secondary { background: #e5e7eb; color: #333; }
.btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.note { font-size: 12px; color: #999; line-height: 1.5; }
.error { color: #dc2626; margin-top: 16px; }
.hidden { display: none; }
.new-token { word-break: break-all; background: #f0fdf4; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; color: #166534; }
</style>
</head>
<body>
<div class="card">
  <h1 id="header">Loading...</h1>
  <div id="status-section" class="hidden">
    <div id="status-circle" class="status-circle gray"></div>
    <div id="status-text" class="status-text"></div>
    <div id="streak" class="streak"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="refreshToken()">Refresh my access link</button>
      <button class="btn btn-danger" onclick="revokeToken()">Remove my access</button>
    </div>
  </div>
  <div id="error-msg" class="error hidden"></div>
  <div id="refresh-result" class="hidden new-token"></div>
  <p class="note">This is a read-only status page. If you're concerned, contact them directly.</p>
</div>
<script>
(function() {
  const token = window.location.pathname.split('/').pop().replace('.html', '');
  const baseUrl = window.location.origin;

  async function fetchStatus() {
    try {
      const resp = await fetch(baseUrl + '/portal/' + token);
      if (!resp.ok) {
        document.getElementById('header').textContent = 'Access not found';
        document.getElementById('error-msg').textContent = 'This link is invalid or has been revoked.';
        document.getElementById('error-msg').classList.remove('hidden');
        return;
      }
      const data = await resp.json();
      render(data);
    } catch (e) {
      document.getElementById('header').textContent = 'Something went wrong';
      document.getElementById('error-msg').textContent = 'Could not load status.';
      document.getElementById('error-msg').classList.remove('hidden');
    }
  }

  function render(data) {
    document.getElementById('header').textContent = data.user_name + ' listed you as an emergency contact';
    const circle = document.getElementById('status-circle');
    const text = document.getElementById('status-text');
    const streakEl = document.getElementById('streak');

    if (data.escalation_active) {
      circle.className = 'status-circle red';
      text.textContent = 'Escalation is active';
    } else if (!data.last_checkin) {
      circle.className = 'status-circle red';
      text.textContent = "Hasn't checked in recently";
    } else {
      const hours = Math.floor((Date.now() - new Date(data.last_checkin).getTime()) / 3600000);
      if (hours < 24) {
        circle.className = 'status-circle green';
        text.textContent = 'Checked in today';
      } else {
        circle.className = 'status-circle yellow';
        text.textContent = 'Last checked in ' + hours + ' hours ago';
      }
    }

    if (data.streak > 0) {
      streakEl.textContent = data.streak + ' day' + (data.streak !== 1 ? 's' : '') + ' of checking in';
    } else {
      streakEl.textContent = '';
    }

    document.getElementById('status-section').classList.remove('hidden');
  }

  window.refreshToken = async function() {
    try {
      const resp = await fetch(baseUrl + '/portal/' + token + '/refresh', { method: 'POST' });
      if (!resp.ok) {
        alert('Could not refresh token.');
        return;
      }
      const data = await resp.json();
      const el = document.getElementById('refresh-result');
      el.textContent = 'New link: ' + baseUrl + '/portal/' + data.token + '.html';
      el.classList.remove('hidden');
    } catch (e) {
      alert('Could not refresh token.');
    }
  };

  window.revokeToken = async function() {
    if (!confirm('This will remove your access. Are you sure?')) return;
    try {
      await fetch(baseUrl + '/portal/' + token + '/revoke', { method: 'POST' });
      document.getElementById('status-section').classList.add('hidden');
      document.getElementById('header').textContent = 'Access removed';
    } catch (e) {
      alert('Could not revoke token.');
    }
  };

  fetchStatus();
})();
</script>
</body>
</html>
